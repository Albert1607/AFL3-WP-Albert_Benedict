<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Benedict - Gallery</title>
    <link rel="icon" type="image/png" href="Assets/AB%20Transparant.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
    

    <nav class="relative border-b border-gray-200 bg-white z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex-shrink-0 flex items-center">
                    <img src="Assets/AB%20Transparant.png" alt="AB Logo" class="h-14 w-auto">
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-600 hover:text-blue-800 transition-colors">Home</a>
                    <a href="hobby.html" class="text-gray-600 hover:text-blue-800 transition-colors">Hobby</a>
                    <a href="gallery.html" class="text-blue-800 font-semibold hover:text-blue-600 transition-colors">Gallery</a>
                </div>

                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-blue-800 focus:outline-none">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-200 shadow-lg absolute w-full left-0">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-blue-800 hover:bg-gray-50 rounded-md">Home</a>
                <a href="hobby.html" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-blue-800 hover:bg-gray-50 rounded-md">Hobby</a>
                <a href="gallery.html" class="block px-3 py-2 text-base font-semibold text-blue-800 bg-blue-50 rounded-md">Gallery</a>
            </div>
        </div>
    </nav>


    <main class="flex-grow">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

            <div class="text-center mb-16">
                <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-4">Photo Gallery</h1>
                <p class="text-gray-500 text-lg">
                    A collection of my favorite captures from travels, events, and everyday moments
                </p>
            </div>
            

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/A1P00179.JPG" alt="Gallery Image 1" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/A1P00599.jpg" alt="Gallery Image 2" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/A1P00757.jpg" alt="Gallery Image 3" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/IMG-20241112-WA0013.jpg" alt="Gallery Image 4" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/IMG-20250407-WA0017.jpg" alt="Gallery Image 5" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/IMG-20250421-WA0011.jpg" alt="Gallery Image 6" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/IMG_20250514_145444.jpg" alt="Gallery Image 7" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/A1P00056.JPG" alt="Gallery Image 8" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
                <div class="aspect-square overflow-hidden rounded-xl bg-gray-100">
                    <img src="Assets/A1P00098.JPG" alt="Gallery Image 9" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </div>
            </div>
        </div>
    </main>


    <footer class="bg-[#26448e] text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <div class="flex space-x-6 mb-6">
                <a href="#" class="text-white hover:text-blue-200 transition-colors">
                    <span class="sr-only">GitHub</span>
                    <i data-lucide="github" class="w-6 h-6"></i>
                </a>
                <a href="#" class="text-white hover:text-blue-200 transition-colors">
                    <span class="sr-only">LinkedIn</span>
                    <i data-lucide="linkedin" class="w-6 h-6"></i>
                </a>
                <a href="#" class="text-white hover:text-blue-200 transition-colors">
                    <span class="sr-only">Twitter</span>
                    <i data-lucide="twitter" class="w-6 h-6"></i>
                </a>
            </div>
            <div class="flex items-center mb-6">
                <i data-lucide="mail" class="w-5 h-5 mr-2"></i>
                <a href="mailto:albert.benedictu@email.com" class="hover:underline">albert.benedictu@email.com</a>
            </div>
            <p class="text-sm text-blue-200">
                &copy; 2026 Albert Benedict. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
